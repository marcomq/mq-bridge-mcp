# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.0.0)'
        required: true

env:
  IMAGE_NAME: ${{ github.repository }}
  # Bump this when you change the compiler toolchain, cmake config, or rdkafka
  # features to invalidate the GHA Docker layer cache for that platform.
  DOCKER_CACHE_VERSION: 2

jobs:
  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config zlib1g-dev cmake libcurl4-openssl-dev

      - name: Build binary
        run: cargo build --release

      - name: Run integration tests
        env:
          MQ_BRIDGE_BINARY: ./target/release/mq-bridge-mcp
        run: cargo test --release --no-default-features --test integration_tests

  create-release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: Release ${{ inputs.tag_name || github.ref_name }}
          body: See the project README for details on this release.
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}

  build-release-assets:
    name: Build release assets for ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: mq-bridge-app
            mcp_binary_name: mq-bridge-mcp
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: mq-bridge-app
            mcp_binary_name: mq-bridge-mcp
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: mq-bridge-app.exe
            mcp_binary_name: mq-bridge-mcp.exe
            use_cross: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config openssl@3

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package artifacts
        shell: bash
        run: |
          ASSET_NAME="mq-bridge-app-${{ matrix.target }}"
          mkdir staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" staging/
          cp "target/${{ matrix.target }}/release/${{ matrix.mcp_binary_name }}" staging/
          cp LICENSE README.md staging/
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a "${ASSET_NAME}.zip" ./staging/*
            echo "ASSET_PATH=${ASSET_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf "${ASSET_NAME}.tar.gz" -C staging .
            echo "ASSET_PATH=${ASSET_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: ${{ env.ASSET_PATH }}

  # Build each platform in its own job so failures are clearly attributed
  # in the GitHub Actions UI — no more guessing which platform broke.
  # We combine the App and MCP builds per architecture to reuse the builder stage cache.
  build-linux-amd64:
    name: Build linux/amd64
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mq-bridge-app (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: final
          push: true
          # Temporary per-platform tag, merged into the final manifest below
          tags: ghcr.io/${{ env.IMAGE_NAME }}:amd64-tmp
          build-args: |
            CACHE_BUST=${{ env.DOCKER_CACHE_VERSION }}
          cache-from: type=gha,scope=build-amd64-v${{ env.DOCKER_CACHE_VERSION }}
          cache-to: type=gha,mode=max,scope=build-amd64-v${{ env.DOCKER_CACHE_VERSION }}

      - name: Build and push mq-bridge-mcp (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: mcp-final
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-mcp:amd64-tmp
          build-args: |
            CACHE_BUST=${{ env.DOCKER_CACHE_VERSION }}
          cache-from: type=gha,scope=build-amd64-v${{ env.DOCKER_CACHE_VERSION }}
          cache-to: type=gha,mode=max,scope=build-amd64-v${{ env.DOCKER_CACHE_VERSION }}

  build-linux-arm64:
    name: Build linux/arm64
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU is only needed for the arm64 job (emulation for non-native steps)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mq-bridge-app (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          target: final
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:arm64-tmp
          build-args: |
            CACHE_BUST=${{ env.DOCKER_CACHE_VERSION }}
          cache-from: type=gha,scope=build-arm64-v${{ env.DOCKER_CACHE_VERSION }}
          cache-to: type=gha,mode=max,scope=build-arm64-v${{ env.DOCKER_CACHE_VERSION }}

      - name: Build and push mq-bridge-mcp (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          target: mcp-final
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}-mcp:arm64-tmp
          build-args: |
            CACHE_BUST=${{ env.DOCKER_CACHE_VERSION }}
          cache-from: type=gha,scope=build-arm64-v${{ env.DOCKER_CACHE_VERSION }}
          cache-to: type=gha,mode=max,scope=build-arm64-v${{ env.DOCKER_CACHE_VERSION }}

  # Merge both platform images into a single multi-arch manifest
  publish-manifest:
    name: Push multi-arch manifest
    needs: [build-linux-amd64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: get_version
        run: |
          echo "VERSION=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' Cargo.toml | head -n1)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }} \
            --tag ghcr.io/${{ env.IMAGE_NAME }}:latest \
            ghcr.io/${{ env.IMAGE_NAME }}:amd64-tmp \
            ghcr.io/${{ env.IMAGE_NAME }}:arm64-tmp

  publish-mcp-manifest:
    name: Push mcp multi-arch manifest
    needs: [build-linux-amd64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: get_version
        run: |
          echo "VERSION=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' Cargo.toml | head -n1)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest for mcp
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.IMAGE_NAME }}-mcp:${{ steps.get_version.outputs.VERSION }} \
            --tag ghcr.io/${{ env.IMAGE_NAME }}-mcp:latest \
            ghcr.io/${{ env.IMAGE_NAME }}-mcp:amd64-tmp \
            ghcr.io/${{ env.IMAGE_NAME }}-mcp:arm64-tmp